<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統更新中...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        .stage { display: none; height: 100vh; width: 100vw; }
        .active { display: flex; }
        
        /* Windows Spinner */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Retro Window Shadow */
        .retro-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- 階段 1: Windows 更新畫面 -->
    <div id="stage-update" class="stage active flex-col items-center justify-center bg-[#0078d7]">
        <div class="mb-10 text-center">
            <span class="loader"></span>
        </div>
        <h1 class="text-3xl font-light mb-2">正在處理更新 <span id="progress">0</span>%</h1>
        <p class="text-sm opacity-80">請保持電腦開機。這可能需要一點時間。</p>
    </div>

    <!-- 階段 2: Spotify 攔截畫面 -->
    <div id="stage-spotify" class="stage flex-col items-center justify-center bg-[#121212] p-6 text-center">
        <!-- Spotify SVG Logo -->
        <svg viewBox="0 0 168 168" class="w-24 h-24 mb-6">
            <circle cx="84" cy="84" r="84" fill="#1DB954" />
            <path d="M119.1 118.8c-1.5 2.4-4.6 3.2-7 1.7-19.1-11.7-43.2-14.3-71.5-7.8-2.7.6-5.5-1.1-6.1-3.8-.6-2.7 1.1-5.5 3.8-6.1 31.1-7.1 57.7-4.1 79.1 9 2.4 1.5 3.2 4.6 1.7 7zM129.2 96.2c-1.9 3.1-5.9 4-9 2.1-21.9-13.4-55.2-17.3-81.1-9.5-3.4 1-7-0.9-8-4.3s.9-7 4.3-8c29.6-9 66.4-4.6 91.5 10.8 3.1 1.9 4.1 5.8 2.3 8.9zm1.1-23.5c-26.3-15.6-70-17.1-95.2-9.4-4 1.2-8.3-1.1-9.5-5.1s1.1-8.3 5.1-9.5c29.5-8.9 77.6-7.3 108.2 10.9 3.6 2.1 4.8 6.8 2.7 10.4-2.1 3.6-6.8 4.8-10.4 2.7z" fill="black" />
        </svg>
        
        <h2 class="text-[#1DB954] text-4xl font-black mb-8 italic tracking-tighter">AUDIO SYSTEM BLOCKED</h2>
        
        <div class="bg-zinc-900 border-l-8 border-[#1DB954] p-8 rounded-lg max-w-xl mb-12">
            <p class="text-white text-3xl font-bold leading-relaxed">
                「你是不是正在放歌？<br>
                <span class="text-[#1DB954]">隔壁 OK Google 聽就好！</span>」
            </p>
        </div>

        <button onclick="nextStage('stage-spotify', 'stage-final')" class="bg-[#1DB954] text-black px-10 py-4 rounded-full font-black text-xl hover:scale-105 transition-transform active:scale-95 shadow-lg">
            我懂了，我改用 OK Google
        </button>
    </div>

    <!-- 階段 3: 最終警告視窗 -->
    <div id="stage-final" class="stage flex-col items-center justify-center bg-[#330000]">
        <div class="bg-gray-200 w-full max-w-md border-2 border-black retro-shadow">
            <!-- Window Header -->
            <div class="bg-red-700 px-3 py-1 flex justify-between items-center border-b-2 border-black">
                <span class="text-white font-bold text-sm">CRITICAL_ERROR_SYSTEM_HALT</span>
                <div class="bg-gray-300 border border-black px-1 text-black font-bold text-xs">X</div>
            </div>
            
            <div class="p-8 text-center text-black">
                <div class="text-red-600 text-6xl mb-4 font-serif">⚠️</div>
                <h3 class="text-2xl font-black mb-6 leading-snug">
                    「不需要買這台桌機，<br>
                    太High了，<br>
                    不要再浪費錢了，林柏儒。」
                </h3>
                <div class="w-full h-0.5 bg-gray-400 mb-6"></div>
                <p class="text-xs font-mono text-gray-500 uppercase">Status: Student_Account_Insufficient_Balance</p>
                
                <button onclick="location.reload()" class="mt-8 w-full bg-gray-300 border-2 border-black py-2 font-bold hover:bg-gray-100 active:bg-gray-400">
                    知道了 (關閉警告)
                </button>
            </div>
        </div>
    </div>

    <script>
        function nextStage(currentId, nextId) {
            document.getElementById(currentId).classList.remove('active');
            document.getElementById(nextId).classList.add('active');
        }

        // 模擬進度條
        let progress = 0;
        const progressEl = document.getElementById('progress');
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 8) + 2;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    nextStage('stage-update', 'stage-spotify');
                }, 1500);
            }
            progressEl.innerText = progress;
        }, 200);
    </script>
</body>
</html>
